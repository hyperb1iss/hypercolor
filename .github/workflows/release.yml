name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version or RC version to tag, without leading v"
        required: true
        default: "0.1.0"
      dry_run:
        description: "Validate the release tag without pushing it"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install release tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: ${INPUT_VERSION}" >&2
            exit 1
          fi

          cargo_version="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "hypercolor-daemon") | .version')"
          base_version="${version%%-*}"
          if [[ "${base_version}" != "${cargo_version}" ]]; then
            echo "Tag version ${version} does not match Cargo version ${cargo_version}" >&2
            echo "Update the workspace version before cutting this release." >&2
            exit 1
          fi

          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "prerelease=${prerelease}"
          } >>"$GITHUB_OUTPUT"

      - name: Summarize release plan
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Release plan"
            echo
            echo "- Version: ${VERSION}"
            echo "- Tag: ${TAG}"
            echo "- Prerelease: ${PRERELEASE}"
            echo "- Dry run: ${DRY_RUN}"
            echo
            echo "Pushing the tag triggers ci.yml to build artifacts and publish the release."
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        if: inputs.dry_run == false
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
