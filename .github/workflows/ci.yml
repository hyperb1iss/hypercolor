name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APT_STEP_TIMEOUT: 35m
  APT_HTTP_TIMEOUT: "20"
  APT_RETRIES: "5"
  # System deps shared across Linux jobs
  LINUX_DEPS: >-
    libudev-dev libdbus-1-dev libasound2-dev libpulse0
    libpipewire-0.3-dev
    ccache cmake jq nasm pkg-config lld
    libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
    libxdo-dev
    libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
    librsvg2-dev libfontconfig1-dev libegl1 libssl-dev
  LINUX_RUST_DEPS: >-
    libudev-dev libdbus-1-dev libasound2-dev libpulse0
    libpipewire-0.3-dev
    ccache cmake jq nasm pkg-config lld
    libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
    libxdo-dev libfontconfig1-dev libegl1 libssl-dev
  # Servo and native app checks run separately so their feature/system deps do
  # not force unrelated crates onto the slow path.
  RUST_SHARED_WORKSPACE_ARGS: >-
    --workspace
    --exclude hypercolor-daemon
    --exclude hypercolor-desktop
    --exclude hypercolor-app
    --exclude hypercolor-tray
  HYPERCOLOR_CACHE_DIR: ${{ github.workspace }}/.cache/hypercolor
  CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/hypercolor/target
  MOZBUILD_STATE_PATH: ${{ github.workspace }}/.cache/hypercolor/mozbuild
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read

jobs:
  # ── Change Detection ───────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.rust }}
      python: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'deny.toml'
              - '.github/actions/**'
              - '.github/workflows/*.yml'
            python:
              - 'python/**'
              - 'justfile'
              - '.github/workflows/ci.yml'

  # ── Rust Check (fmt + clippy) ──────────────────────────────────
  rust-check-shared:
    name: Rust Check / Shared
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/hypercolor/target/rust-check-shared
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_RUST_DEPS }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/rust-build-cache
        with:
          shared-key: rust-check-shared
          workspaces: . -> .cache/hypercolor/target/rust-check-shared
          cache-on-failure: "false"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy shared crates
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked ${{ env.RUST_SHARED_WORKSPACE_ARGS }} --all-targets
          -- -D warnings

  rust-check-servo:
    name: Rust Check / ${{ matrix.label }}
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: core-servo
            label: Core Servo
            shared_key: servo-core
            target_dir: .cache/hypercolor/target/servo-core
          - suite: daemon-servo
            label: Daemon Servo
            shared_key: servo-daemon
            target_dir: .cache/hypercolor/target/servo-daemon
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/${{ matrix.target_dir }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_RUST_DEPS }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/rust-build-cache
        with:
          shared-key: ${{ matrix.shared_key }}
          workspaces: . -> ${{ matrix.target_dir }}
          cache-on-failure: "false"

      - name: Clippy core with Servo
        if: matrix.suite == 'core-servo'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked -p hypercolor-core --features servo --lib --tests
          -- -D warnings

      - name: Clippy daemon with Servo
        if: matrix.suite == 'daemon-servo'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked -p hypercolor-daemon --lib --bin hypercolor-daemon --tests
          -- -D warnings

  rust-check-native:
    name: Rust Check / Native App
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/hypercolor/target/rust-check-native
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_DEPS }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/rust-build-cache
        with:
          shared-key: rust-check-native
          workspaces: . -> .cache/hypercolor/target/rust-check-native
          cache-on-failure: "false"

      - name: Clippy native app crates
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked -p hypercolor-app -p hypercolor-tray --all-targets
          -- -D warnings

  # ── Rust Test ──────────────────────────────────────────────────
  rust-test:
    name: Rust Test / ${{ matrix.label }}
    needs: [changes, sdk]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: shared
            label: Shared
            shared_key: rust-test-shared
            target_dir: .cache/hypercolor/target/rust-test-shared
          - suite: native
            label: Native App
            shared_key: rust-test-native
            target_dir: .cache/hypercolor/target/rust-test-native
          - suite: daemon
            label: Daemon
            shared_key: rust-test-daemon
            target_dir: .cache/hypercolor/target/rust-test-daemon
          - suite: core-servo
            label: Core Servo
            shared_key: servo-core
            target_dir: .cache/hypercolor/target/servo-core
          - suite: daemon-servo
            label: Daemon Servo
            shared_key: servo-daemon
            target_dir: .cache/hypercolor/target/servo-daemon
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/${{ matrix.target_dir }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ matrix.suite == 'native' && env.LINUX_DEPS || env.LINUX_RUST_DEPS }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/rust-build-cache
        with:
          shared-key: ${{ matrix.shared_key }}
          workspaces: . -> ${{ matrix.target_dir }}
          cache-on-failure: "false"

      - name: Download generated effects
        if: matrix.suite == 'shared'
        uses: actions/download-artifact@v4
        with:
          name: generated-effects
          path: effects/hypercolor

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run shared crate tests
        if: matrix.suite == 'shared'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo nextest run --locked ${{ env.RUST_SHARED_WORKSPACE_ARGS }}

      - name: Run shared crate doc tests
        if: matrix.suite == 'shared'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo test --doc --locked ${{ env.RUST_SHARED_WORKSPACE_ARGS }}

      - name: Run native app tests
        if: matrix.suite == 'native'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo nextest run --locked -p hypercolor-app -p hypercolor-tray

      - name: Run native app doc tests
        if: matrix.suite == 'native'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo test --doc --locked -p hypercolor-app -p hypercolor-tray

      - name: Seed effect cover fixture
        if: matrix.suite == 'daemon'
        run: |
          mkdir -p effects/screenshots/curated/rainbow
          printf 'RIFFtest-webp-fixture' > effects/screenshots/curated/rainbow/default.webp

      - name: Run daemon tests
        if: matrix.suite == 'daemon'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo nextest run --locked -p hypercolor-daemon --no-default-features
          --features builtin-drivers --test-threads=1

      - name: Run daemon doc tests
        if: matrix.suite == 'daemon'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo test --doc --locked -p hypercolor-daemon --no-default-features
          --features builtin-drivers

      - name: Run core Servo tests
        if: matrix.suite == 'core-servo'
        run: |
          ./scripts/cargo-cache-build.sh cargo test --locked -p hypercolor-core --features servo --test effect_factory_tests
          ./scripts/cargo-cache-build.sh cargo test --locked -p hypercolor-core --features servo --test builtin_effect_tests

      - name: Run core Servo doc tests
        if: matrix.suite == 'core-servo'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo test --doc --locked -p hypercolor-core --features servo

      - name: Run daemon Servo tests
        if: matrix.suite == 'daemon-servo'
        run: |
          ./scripts/cargo-cache-build.sh cargo test --locked -p hypercolor-daemon --lib -- --test-threads=1
          ./scripts/cargo-cache-build.sh cargo test --locked -p hypercolor-daemon --bin hypercolor-daemon -- --test-threads=1

      - name: Run daemon Servo doc tests
        if: matrix.suite == 'daemon-servo'
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo test --doc --locked -p hypercolor-daemon

  # ── Cargo Deny ─────────────────────────────────────────────────
  rust-deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: ""

  # ── Compatibility Matrix Drift ─────────────────────────────────
  # Fails if data/drivers/vendors/*.toml was edited without regenerating the
  # compatibility matrix (README compat block, Zola page, JSON, snippet).
  # Zero external deps; the generator uses only Bun's stdlib.
  compat:
    name: Compatibility Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Verify compatibility matrix is current
        run: bun scripts/gen-compat.ts --check

  # ── Python Client ────────────────────────────────────────────────
  python:
    name: Python Client
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version-file: python/.python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Verify WebSocket protocol constants
        run: uv run python scripts/generate_ws_protocol.py --check

      - name: Run tests
        run: uv run pytest

  # ── Python Generated Client Drift ──────────────────────────────
  python-generated:
    name: Python Generated Client
    needs: [changes, rust-check-shared]
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.rust == 'true') &&
      (needs.rust-check-shared.result == 'success' ||
      needs.rust-check-shared.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_RUST_DEPS }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version-file: python/.python-version

      - uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/rust-build-cache

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify generated client is current
        run: uv run python scripts/generate_openapi_client.py --check

  # ── Python Package ───────────────────────────────────────────────
  python-build:
    name: Python Package
    needs: [python, python-generated]
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: python/.python-version

      - name: Patch package version from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" pyproject.toml
          grep '^version = ' pyproject.toml

      - name: Build package
        run: uv build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*
          if-no-files-found: error

  # ── SDK (TypeScript / Bun) ─────────────────────────────────────
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-cache
        with:
          key: sdk-${{ hashFiles('sdk/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run build
      - run: bun run build:effects

      - name: Upload generated effects
        uses: actions/upload-artifact@v4
        with:
          name: generated-effects
          path: effects/hypercolor
          if-no-files-found: error

  # ── UI (Leptos / Trunk) ────────────────────────────────────────
  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/hypercolor-ui
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-cache
        with:
          key: ui-${{ hashFiles('crates/hypercolor-ui/bun.lock') }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/rust-build-cache
        with:
          key: ui
      - run: bun install --frozen-lockfile
      - run: cargo test
      - name: Install Trunk
        run: cargo install trunk --locked
      - run: env -u NO_COLOR trunk build --release

  # ── End-to-End (Playwright) ──────────────────────────────────
  e2e-build:
    name: E2E Build / ${{ matrix.label }}
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: servo
            label: Servo
            build_recipe: e2e-build
            shared_key: servo-daemon
            cache_key: e2e-dev-v1
            target_dir: .cache/hypercolor/target/servo-daemon
          - suite: cpu
            label: CPU Smoke
            build_recipe: e2e-build-cpu
            shared_key: e2e-cpu
            cache_key: ""
            target_dir: .cache/hypercolor/target/e2e-cpu
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/${{ matrix.target_dir }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_RUST_DEPS }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: ./.github/actions/bun-cache
        with:
          key: e2e-${{ hashFiles('sdk/bun.lock', 'crates/hypercolor-ui/bun.lock') }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/rust-build-cache
        with:
          shared-key: ${{ matrix.shared_key }}
          key: ${{ matrix.cache_key }}
          workspaces: . -> ${{ matrix.target_dir }}
          cache-on-failure: "false"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install SDK dependencies
        working-directory: sdk
        run: bun install --frozen-lockfile

      - name: Install UI dependencies
        working-directory: crates/hypercolor-ui
        run: bun install --frozen-lockfile

      - name: Build e2e stack
        run: just ${{ matrix.build_recipe }}

      - name: Stage e2e stack
        run: |
          rm -rf e2e-stack
          mkdir -p e2e-stack/bin e2e-stack/effects e2e-stack/ui
          install -m755 "${CARGO_TARGET_DIR}/debug/hypercolor-daemon" \
            e2e-stack/bin/hypercolor-daemon
          install -m755 "${CARGO_TARGET_DIR}/debug/hypercolor" \
            e2e-stack/bin/hypercolor
          cp -R crates/hypercolor-ui/dist/. e2e-stack/ui/
          cp -R effects/hypercolor/. e2e-stack/effects/

      - name: Upload e2e stack
        uses: actions/upload-artifact@v4
        with:
          name: e2e-stack-${{ matrix.suite }}
          path: e2e-stack
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: E2E / ${{ matrix.label }}
    needs: [rust-check-shared, e2e-build]
    if: >-
      always() &&
      (needs.rust-check-shared.result == 'success' ||
      needs.rust-check-shared.result == 'skipped') &&
      needs.e2e-build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: servo
            label: Servo
          - suite: cpu
            label: CPU Smoke
    env:
      HYPERCOLOR_E2E_KEEP_RUN_DIR: "1"
      HYPERCOLOR_E2E_DAEMON_BIN: ${{ github.workspace }}/e2e-stack/bin/hypercolor-daemon
      HYPERCOLOR_E2E_CLI_BIN: ${{ github.workspace }}/e2e-stack/bin/hypercolor
      HYPERCOLOR_E2E_UI_DIST_DIR: ${{ github.workspace }}/crates/hypercolor-ui/dist
      HYPERCOLOR_E2E_STACK: ${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v6

      - name: Download e2e stack
        uses: actions/download-artifact@v4
        with:
          name: e2e-stack-${{ matrix.suite }}
          path: e2e-stack

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_RUST_DEPS }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Restore e2e stack
        run: |
          chmod +x e2e-stack/bin/hypercolor-daemon e2e-stack/bin/hypercolor
          rm -rf crates/hypercolor-ui/dist effects/hypercolor
          mkdir -p crates/hypercolor-ui/dist effects/hypercolor
          cp -R e2e-stack/ui/. crates/hypercolor-ui/dist/
          cp -R e2e-stack/effects/. effects/hypercolor/

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        working-directory: e2e
        run: npm test

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.suite }}
          path: |
            e2e/playwright-report
            e2e/test-results
            /tmp/hypercolor-e2e-*

  # ── Docs (Zola → GitHub Pages) ─────────────────────────────────
  docs:
    name: Docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Build site
        working-directory: docs
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  # ── Web Assets (built once, shared across release platforms) ───
  web-assets:
    name: Web Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-cache
        with:
          key: web-assets-${{ hashFiles('sdk/bun.lock', 'crates/hypercolor-ui/bun.lock') }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/rust-build-cache
        with:
          key: web-assets

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build UI
        working-directory: crates/hypercolor-ui
        run: |
          bun install --frozen-lockfile
          env -u NO_COLOR trunk build --release

      - name: Build effects
        working-directory: sdk
        run: |
          bun install --frozen-lockfile
          bun run build:effects

      - name: Stage web assets
        run: |
          mkdir -p staging/ui staging/effects
          cp -R crates/hypercolor-ui/dist/. staging/ui/
          if [ -d effects/hypercolor ]; then
            cp -R effects/hypercolor/. staging/effects/
          fi

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: staging/
          if-no-files-found: error

  # ── Build Native App Installers ───────────────────────────────
  build-native-app:
    name: Native App (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-check-shared, rust-check-servo, rust-check-native, rust-test, rust-deny, sdk, ui, e2e, web-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact-kind: nsis
            cask_arch: ""
            artifact-path: |
              target/release/bundle/nsis/*.exe
              crates/hypercolor-app/target/release/bundle/nsis/*.exe
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg,app
            artifact-kind: dmg-app
            cask_arch: arm64
            artifact-path: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              crates/hypercolor-app/target/release/bundle/dmg/*.dmg
              crates/hypercolor-app/target/release/bundle/macos/*.app
          - target: macos-x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            bundles: dmg,app
            artifact-kind: dmg-app
            cask_arch: x86_64
            artifact-path: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              crates/hypercolor-app/target/release/bundle/dmg/*.dmg
              crates/hypercolor-app/target/release/bundle/macos/*.app
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: target
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: ./.github/actions/rust-build-cache
        with:
          key: native-app-${{ matrix.target }}
          workspaces: . -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: web-assets/

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Patch app version from tag
        shell: pwsh
        run: |
          $configPath = "crates/hypercolor-app/tauri.conf.json"
          $config = Get-Content -Raw $configPath | ConvertFrom-Json
          $config.version = "${{ steps.version.outputs.version }}"
          $config | ConvertTo-Json -Depth 100 | Set-Content -NoNewline $configPath

      - name: Build native sidecar binaries
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            ./scripts/cargo-cache-build.ps1 cargo build --release --locked -p hypercolor-daemon --features servo
            ./scripts/cargo-cache-build.ps1 cargo build --release --locked -p hypercolor-cli
          } else {
            bash ./scripts/cargo-cache-build.sh cargo build --release --locked -p hypercolor-daemon --features servo
            bash ./scripts/cargo-cache-build.sh cargo build --release --locked -p hypercolor-cli
          }
          if ($env:RUNNER_OS -eq "Windows") {
            ./scripts/cargo-cache-build.ps1 cargo build --release --locked -p hypercolor-windows-pawnio --bin hypercolor-smbus-service
          }

      - name: Stage downloaded web assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Copy-Tree($Source, $Destination) {
            if (Test-Path -LiteralPath $Destination) {
              Remove-Item -LiteralPath $Destination -Recurse -Force
            }
            New-Item -ItemType Directory -Force -Path $Destination | Out-Null

            if (Test-Path -LiteralPath $Source) {
              Get-ChildItem -LiteralPath $Source -Force |
                ForEach-Object {
                  Copy-Item -LiteralPath $_.FullName -Destination $Destination -Recurse -Force
                }
            }
          }

          Copy-Tree "web-assets/ui" "crates/hypercolor-ui/dist"
          Copy-Tree "web-assets/effects" "effects/hypercolor"

      - name: Stage app bundle payload
        shell: pwsh
        run: ./scripts/stage-app-bundle-assets.ps1

      - name: Build Tauri native bundle
        working-directory: crates/hypercolor-app
        shell: pwsh
        env:
          TAURI_BUNDLES: ${{ matrix.bundles }}
        run: |
          $configArgs = @()
          if (Test-Path "tauri.bundle.conf.json") {
            $configArgs += @("--config", "tauri.bundle.conf.json")
          }
          cargo tauri build --ci --no-sign --bundles $env:TAURI_BUNDLES @configArgs

      - name: Normalize macOS DMG artifact name
        if: matrix.cask_arch != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.cask_arch }}"
          $dmgFiles = @()

          foreach ($dir in @("target/release/bundle/dmg", "crates/hypercolor-app/target/release/bundle/dmg")) {
            if (Test-Path -LiteralPath $dir) {
              $dmgFiles += @(Get-ChildItem -LiteralPath $dir -Filter "*.dmg" -File)
            }
          }

          if ($dmgFiles.Count -ne 1) {
            $found = ($dmgFiles | ForEach-Object { $_.FullName }) -join ", "
            throw "Expected exactly one DMG for cask packaging, found $($dmgFiles.Count): $found"
          }

          $targetName = "Hypercolor-$version-$arch.dmg"
          $targetPath = Join-Path $dmgFiles[0].DirectoryName $targetName
          if ($dmgFiles[0].FullName -ne $targetPath) {
            Move-Item -LiteralPath $dmgFiles[0].FullName -Destination $targetPath -Force
          }

      - name: Upload native app bundle
        uses: actions/upload-artifact@v4
        with:
          name: hypercolor-app-${{ steps.version.outputs.version }}-${{ matrix.target }}-${{ matrix.artifact-kind }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  # ── Build Release Tarballs ────────────────────────────────────
  build-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-check-shared, rust-check-servo, rust-check-native, rust-test, rust-deny, sdk, ui, e2e, web-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_DEPS }} librsvg2-bin

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: ./.github/actions/rust-build-cache
        with:
          key: release-${{ matrix.target }}

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: web-assets/

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dist_name=hypercolor-${VERSION}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Assemble distribution
        run: >-
          ./scripts/dist.sh --ci --skip-docs
          --web-assets web-assets
          --target ${{ matrix.target }}
          --version ${{ steps.version.outputs.version }}

      - name: Generate release checksum
        run: |
          set -euo pipefail
          dist_name="${{ steps.version.outputs.dist_name }}"
          tarball="${dist_name}.tar.gz"
          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${tarball}" > "${tarball}.sha256"
            else
              shasum -a 256 "${tarball}" > "${tarball}.sha256"
            fi
            cat "${tarball}.sha256"
          )

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.dist_name }}
          path: |
            dist/${{ steps.version.outputs.dist_name }}.tar.gz
            dist/${{ steps.version.outputs.dist_name }}.tar.gz.sha256
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-release, build-native-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: hypercolor-*
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          args=(
            "${GITHUB_REF_NAME}"
            --title "Hypercolor ${GITHUB_REF_NAME#v}"
            --generate-notes
            --verify-tag
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}" "${files[@]}"

  # ── Update Homebrew Tap ────────────────────────────────────────
  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for platform in linux-amd64 linux-arm64 macos-arm64; do
            tarball="hypercolor-${VERSION}-${platform}.tar.gz"
            url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${tarball}"
            echo "Downloading ${tarball}..."
            curl -fSL "${url}" -o "${tarball}"
            sha=$(sha256sum "${tarball}" | cut -d' ' -f1)
            echo "sha256_${platform//-/_}=${sha}" >> "$GITHUB_OUTPUT"
            echo "  ${platform}: ${sha}"
          done

          for arch in arm64 x86_64; do
            dmg="Hypercolor-${VERSION}-${arch}.dmg"
            url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${dmg}"
            echo "Downloading ${dmg}..."
            curl -fSL "${url}" -o "${dmg}"
            sha=$(sha256sum "${dmg}" | cut -d' ' -f1)
            case "${arch}" in
              arm64) echo "sha256_macos_app_arm64=${sha}" >> "$GITHUB_OUTPUT" ;;
              x86_64) echo "sha256_macos_app_x86_64=${sha}" >> "$GITHUB_OUTPUT" ;;
            esac
            echo "  macos-app-${arch}: ${sha}"
          done

      - name: Generate Homebrew files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_MACOS_ARM64/${{ steps.checksums.outputs.sha256_macos_arm64 }}/g" \
            -e "s/SHA256_LINUX_AMD64/${{ steps.checksums.outputs.sha256_linux_amd64 }}/g" \
            -e "s/SHA256_LINUX_ARM64/${{ steps.checksums.outputs.sha256_linux_arm64 }}/g" \
            packaging/homebrew/hypercolor.rb > hypercolor.rb
          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_MACOS_APP_ARM64/${{ steps.checksums.outputs.sha256_macos_app_arm64 }}/g" \
            -e "s/SHA256_MACOS_APP_X86_64/${{ steps.checksums.outputs.sha256_macos_app_x86_64 }}/g" \
            packaging/homebrew/hypercolor-app.rb > hypercolor-app.rb
          echo "Generated formula:"
          cat hypercolor.rb
          echo "Generated cask:"
          cat hypercolor-app.rb

      - name: Upload Homebrew files
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-hypercolor-${{ steps.version.outputs.version }}
          path: |
            hypercolor.rb
            hypercolor-app.rb
          if-no-files-found: error

      - name: Push to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; artifact only."
            exit 0
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/hyperb1iss/homebrew-tap.git" tap
          mkdir -p tap/Formula tap/Casks
          cp hypercolor.rb tap/Formula/hypercolor.rb
          cp hypercolor-app.rb tap/Casks/hypercolor-app.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hypercolor.rb Casks/hypercolor-app.rb
          git commit -m "hypercolor: update to ${{ steps.version.outputs.version }}"
          git push

  # ── Update AUR Package ────────────────────────────────────────
  update-aur:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          for platform in linux-amd64 linux-arm64; do
            tarball="hypercolor-${VERSION}-${platform}.tar.gz"
            gh release download "v${VERSION}" \
              --repo "${{ github.repository }}" \
              --pattern "${tarball}" \
              --dir release-artifacts
            sha=$(sha256sum "release-artifacts/${tarball}" | cut -d' ' -f1)
            echo "sha256_${platform//-/_}=${sha}" >> "$GITHUB_OUTPUT"
            echo "  ${platform}: ${sha}"
          done

      - name: Generate AUR package files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p aur
          sed \
            -e "s/pkgver=.*/pkgver=${VERSION}/" \
            -e "s/SHA256_LINUX_AMD64/${{ steps.checksums.outputs.sha256_linux_amd64 }}/g" \
            -e "s/SHA256_LINUX_ARM64/${{ steps.checksums.outputs.sha256_linux_arm64 }}/g" \
            packaging/aur/PKGBUILD > aur/PKGBUILD
          cp packaging/aur/hypercolor.install aur/hypercolor.install

          if grep -Eq "SKIP|SHA256_LINUX_" aur/PKGBUILD; then
            echo "Generated PKGBUILD still contains checksum placeholders" >&2
            exit 1
          fi
          grep -Eq "sha256sums_x86_64=\('[a-f0-9]{64}'\)" aur/PKGBUILD
          grep -Eq "sha256sums_aarch64=\('[a-f0-9]{64}'\)" aur/PKGBUILD

          echo "Generated AUR PKGBUILD:"
          cat aur/PKGBUILD

      - name: Generate AUR .SRCINFO
        run: |
          set -euo pipefail
          docker run --rm -v "${PWD}/aur:/pkg" archlinux:base-devel bash -lc '
            set -euo pipefail
            useradd -m builder
            chown -R builder:builder /pkg
            su builder -c "cd /pkg && makepkg --printsrcinfo > .SRCINFO"
          '

      - name: Upload AUR package files
        uses: actions/upload-artifact@v4
        with:
          name: aur-hypercolor-bin-${{ steps.version.outputs.version }}
          path: aur/
          include-hidden-files: true
          if-no-files-found: error

      - name: Push to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not configured; artifact only."
            exit 0
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes"
          git clone ssh://aur@aur.archlinux.org/hypercolor-bin.git aur-remote
          cp aur/PKGBUILD aur/.SRCINFO aur/hypercolor.install aur-remote/
          cd aur-remote
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .SRCINFO PKGBUILD hypercolor.install
          git commit -m "hypercolor-bin: update to ${VERSION}" || exit 0
          git push
