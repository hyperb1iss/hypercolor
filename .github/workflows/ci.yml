name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "Run ID of the release workflow (for artifact download)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  # System deps shared across Linux jobs
  LINUX_DEPS: >-
    libudev-dev libdbus-1-dev libasound2-dev libpulse0
    libpipewire-0.3-dev
    ccache cmake nasm pkg-config lld
    libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
    libxdo-dev
    libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
    librsvg2-dev libssl-dev
  # Legacy Tauri desktop shell is excluded; the unified hypercolor-app stays in CI.
  RUST_WORKSPACE_ARGS: >-
    --workspace --exclude hypercolor-desktop
  HYPERCOLOR_CACHE_DIR: ${{ github.workspace }}/.cache/hypercolor
  CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/hypercolor/target
  MOZBUILD_STATE_PATH: ${{ github.workspace }}/.cache/hypercolor/mozbuild
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read

jobs:
  # ── Change Detection ───────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.rust }}
      python: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
            python:
              - 'python/**'
              - 'justfile'
              - '.github/workflows/ci.yml'

  # ── Rust Check (fmt + clippy) ──────────────────────────────────
  rust-check:
    name: Rust Check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/rust-build-cache
        with:
          key: rust-check
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked ${{ env.RUST_WORKSPACE_ARGS }} --all-targets
          -- -D warnings

  # ── Rust Test ──────────────────────────────────────────────────
  rust-test:
    name: Rust Test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/rust-build-cache
        with:
          key: rust-test
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo nextest run --locked ${{ env.RUST_WORKSPACE_ARGS }}

      - name: Run doc tests
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo test --doc --locked ${{ env.RUST_WORKSPACE_ARGS }}

  # ── Cargo Deny ─────────────────────────────────────────────────
  rust-deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: ""

  # ── Compatibility Matrix Drift ─────────────────────────────────
  # Fails if data/drivers/vendors/*.toml was edited without regenerating the
  # compatibility matrix (README compat block, Zola page, JSON, snippet).
  # Zero external deps; the generator uses only Bun's stdlib.
  compat:
    name: Compatibility Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Verify compatibility matrix is current
        run: bun scripts/gen-compat.ts --check

  # ── Python Client ────────────────────────────────────────────────
  python:
    name: Python Client
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version-file: python/.python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Verify WebSocket protocol constants
        run: uv run python scripts/generate_ws_protocol.py --check

      - name: Run tests
        run: uv run pytest

  # ── Python Generated Client Drift ──────────────────────────────
  python-generated:
    name: Python Generated Client
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version-file: python/.python-version

      - uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/rust-build-cache
        with:
          key: python-generated
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify generated client is current
        run: uv run python scripts/generate_openapi_client.py --check

  # ── Python Package ───────────────────────────────────────────────
  python-build:
    name: Python Package
    needs: [python, python-generated]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: python/.python-version

      - name: Patch package version from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" pyproject.toml
          grep '^version = ' pyproject.toml

      - name: Build package
        run: uv build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*
          if-no-files-found: error

  # ── PyPI Publish ────────────────────────────────────────────────
  python-publish:
    name: Publish Python Package
    needs: python-build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hypercolor
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── SDK (TypeScript / Bun) ─────────────────────────────────────
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-cache
        with:
          key: sdk-${{ hashFiles('sdk/bun.lock') }}
      - run: bun install
      - run: bun run check
      - run: bun run typecheck
      - run: bun run build
      - run: bun run build:effects

  # ── UI (Leptos / Trunk) ────────────────────────────────────────
  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/hypercolor-ui
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-cache
        with:
          key: ui-${{ hashFiles('crates/hypercolor-ui/package-lock.json') }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/rust-build-cache
        with:
          key: ui
      - run: bun install
      - run: cargo test
      - name: Install Trunk
        run: cargo install trunk --locked
      - run: env -u NO_COLOR trunk build --release

  # ── End-to-End (Playwright) ──────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HYPERCOLOR_E2E_KEEP_RUN_DIR: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - uses: ./.github/actions/bun-cache
        with:
          key: e2e-${{ hashFiles('sdk/bun.lock', 'crates/hypercolor-ui/package-lock.json') }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/rust-build-cache
        with:
          key: e2e
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install SDK dependencies
        working-directory: sdk
        run: bun install

      - name: Install UI dependencies
        working-directory: crates/hypercolor-ui
        run: bun install

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Build e2e stack
        run: just e2e-build

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        run: just e2e

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
            /tmp/hypercolor-e2e-*

  # ── Docs (Zola → GitHub Pages) ─────────────────────────────────
  docs:
    name: Docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Build site
        working-directory: docs
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Web Assets (built once, shared across release platforms) ───
  web-assets:
    name: Web Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bun-cache
        with:
          key: web-assets-${{ hashFiles('sdk/bun.lock', 'crates/hypercolor-ui/package-lock.json') }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/rust-build-cache
        with:
          key: web-assets

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build UI
        working-directory: crates/hypercolor-ui
        run: |
          bun install
          env -u NO_COLOR trunk build --release

      - name: Build effects
        working-directory: sdk
        run: |
          bun install
          bun run build:effects

      - name: Stage web assets
        run: |
          mkdir -p staging/ui staging/effects
          cp -R crates/hypercolor-ui/dist/. staging/ui/
          if [ -d effects/hypercolor ]; then
            cp -R effects/hypercolor/. staging/effects/
          fi

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: staging/
          if-no-files-found: error

  # ── Build Native App Installers ───────────────────────────────
  build-native-app:
    name: Native App (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-check, rust-test, rust-deny, sdk, ui, e2e, web-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact-kind: nsis
            cask_arch: ""
            artifact-path: |
              target/release/bundle/nsis/*.exe
              crates/hypercolor-app/target/release/bundle/nsis/*.exe
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg,app
            artifact-kind: dmg-app
            cask_arch: arm64
            artifact-path: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              crates/hypercolor-app/target/release/bundle/dmg/*.dmg
              crates/hypercolor-app/target/release/bundle/macos/*.app
          - target: macos-x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            bundles: dmg,app
            artifact-kind: dmg-app
            cask_arch: x86_64
            artifact-path: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              crates/hypercolor-app/target/release/bundle/dmg/*.dmg
              crates/hypercolor-app/target/release/bundle/macos/*.app
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: target
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: ./.github/actions/rust-build-cache
        with:
          key: native-app-${{ matrix.target }}
          workspaces: . -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: web-assets/

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Patch app version from tag
        shell: pwsh
        run: |
          $configPath = "crates/hypercolor-app/tauri.conf.json"
          $config = Get-Content -Raw $configPath | ConvertFrom-Json
          $config.version = "${{ steps.version.outputs.version }}"
          $config | ConvertTo-Json -Depth 100 | Set-Content -NoNewline $configPath

      - name: Build native sidecar binaries
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            ./scripts/cargo-cache-build.ps1 cargo build --release --locked -p hypercolor-daemon --features servo
            ./scripts/cargo-cache-build.ps1 cargo build --release --locked -p hypercolor-cli
          } else {
            bash ./scripts/cargo-cache-build.sh cargo build --release --locked -p hypercolor-daemon --features servo
            bash ./scripts/cargo-cache-build.sh cargo build --release --locked -p hypercolor-cli
          }
          if ($env:RUNNER_OS -eq "Windows") {
            ./scripts/cargo-cache-build.ps1 cargo build --release --locked -p hypercolor-windows-pawnio --bin hypercolor-smbus-service
          }

      - name: Stage downloaded web assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Copy-Tree($Source, $Destination) {
            if (Test-Path -LiteralPath $Destination) {
              Remove-Item -LiteralPath $Destination -Recurse -Force
            }
            New-Item -ItemType Directory -Force -Path $Destination | Out-Null

            if (Test-Path -LiteralPath $Source) {
              Get-ChildItem -LiteralPath $Source -Force |
                ForEach-Object {
                  Copy-Item -LiteralPath $_.FullName -Destination $Destination -Recurse -Force
                }
            }
          }

          Copy-Tree "web-assets/ui" "crates/hypercolor-ui/dist"
          Copy-Tree "web-assets/effects" "effects/hypercolor"

      - name: Stage app bundle payload
        shell: pwsh
        run: ./scripts/stage-app-bundle-assets.ps1

      - name: Build Tauri native bundle
        working-directory: crates/hypercolor-app
        shell: pwsh
        env:
          TAURI_BUNDLES: ${{ matrix.bundles }}
        run: |
          $configArgs = @()
          if (Test-Path "tauri.bundle.conf.json") {
            $configArgs += @("--config", "tauri.bundle.conf.json")
          }
          cargo tauri build --ci --no-sign --bundles $env:TAURI_BUNDLES @configArgs

      - name: Normalize macOS DMG artifact name
        if: matrix.cask_arch != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.cask_arch }}"
          $dmgFiles = @()

          foreach ($dir in @("target/release/bundle/dmg", "crates/hypercolor-app/target/release/bundle/dmg")) {
            if (Test-Path -LiteralPath $dir) {
              $dmgFiles += @(Get-ChildItem -LiteralPath $dir -Filter "*.dmg" -File)
            }
          }

          if ($dmgFiles.Count -ne 1) {
            $found = ($dmgFiles | ForEach-Object { $_.FullName }) -join ", "
            throw "Expected exactly one DMG for cask packaging, found $($dmgFiles.Count): $found"
          }

          $targetName = "Hypercolor-$version-$arch.dmg"
          $targetPath = Join-Path $dmgFiles[0].DirectoryName $targetName
          if ($dmgFiles[0].FullName -ne $targetPath) {
            Move-Item -LiteralPath $dmgFiles[0].FullName -Destination $targetPath -Force
          }

      - name: Upload native app bundle
        uses: actions/upload-artifact@v4
        with:
          name: hypercolor-app-${{ steps.version.outputs.version }}-${{ matrix.target }}-${{ matrix.artifact-kind }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  # ── Build Release Tarballs ────────────────────────────────────
  build-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-check, rust-test, rust-deny, sdk, ui, e2e, web-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }} librsvg2-bin

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: ./.github/actions/rust-build-cache
        with:
          key: release-${{ matrix.target }}

      - name: Build daemon (with Servo)
        run: >-
          ./scripts/cargo-cache-build.sh cargo build --release --locked
          -p hypercolor-daemon --features servo
          --target ${{ matrix.rust-target }}

      - name: Build CLI, tray, and app
        run: >-
          ./scripts/cargo-cache-build.sh cargo build --release --locked
          -p hypercolor-cli
          -p hypercolor-tray
          -p hypercolor-app
          --target ${{ matrix.rust-target }}

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: web-assets/

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dist_name=hypercolor-${VERSION}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Assemble distribution
        env:
          DIST: dist/${{ steps.version.outputs.dist_name }}
          REL: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust-target }}/release
        run: |
          mkdir -p "${DIST}"/{bin,share/hypercolor/{ui,effects/bundled}}
          mkdir -p "${DIST}"/share/{applications,bash-completion/completions,zsh/site-functions}
          mkdir -p "${DIST}"/share/icons/hicolor/{scalable,48x48,128x128,256x256}/apps
          mkdir -p "${DIST}"/share/fish/vendor_completions.d

          # Binaries
          for bin in hypercolor-daemon hypercolor hypercolor-app hypercolor-tray; do
            install -m755 "${REL}/${bin}" "${DIST}/bin/${bin}"
          done
          install -m755 packaging/bin/hypercolor-tui "${DIST}/bin/"
          install -m755 packaging/bin/hypercolor-open "${DIST}/bin/"
          chmod 755 "${DIST}/bin/"*

          # Web assets
          cp -R web-assets/ui/. "${DIST}/share/hypercolor/ui/"
          if [ -d web-assets/effects ]; then
            cp -R web-assets/effects/. "${DIST}/share/hypercolor/effects/bundled/"
          fi

          # Desktop entry + icons
          sed 's|@BIN_DIR@|/usr/bin|g' packaging/desktop/hypercolor.desktop.in \
            > "${DIST}/share/applications/hypercolor.desktop"
          cp packaging/icons/hypercolor.svg "${DIST}/share/icons/hicolor/scalable/apps/"
          if command -v rsvg-convert &>/dev/null; then
            for size in 48 128 256; do
              rsvg-convert -w "${size}" -h "${size}" packaging/icons/hypercolor.svg \
                -o "${DIST}/share/icons/hicolor/${size}x${size}/apps/hypercolor.png"
            done
          fi

          # Shell completions (host builds only)
          if [ "${{ matrix.rust-target }}" = "$(rustc -vV | sed -n 's/host: //p')" ]; then
            "${DIST}/bin/hypercolor" completions bash > "${DIST}/share/bash-completion/completions/hypercolor"
            "${DIST}/bin/hypercolor" completions zsh  > "${DIST}/share/zsh/site-functions/_hypercolor"
            "${DIST}/bin/hypercolor" completions fish > "${DIST}/share/fish/vendor_completions.d/hypercolor.fish"
          fi

          # Linux integration
          if [ "${{ runner.os }}" = "Linux" ]; then
            mkdir -p "${DIST}"/{lib/systemd/user,lib/udev/rules.d,etc/modules-load.d}
            cp packaging/systemd/user/hypercolor.service "${DIST}/lib/systemd/user/"
            cp packaging/systemd/user/hypercolor.service.system "${DIST}/lib/systemd/user/"
            cp udev/99-hypercolor.rules "${DIST}/lib/udev/rules.d/"
            cp packaging/modules-load/i2c-dev.conf "${DIST}/etc/modules-load.d/"
          fi

          # macOS integration
          if [ "${{ runner.os }}" = "macOS" ]; then
            mkdir -p "${DIST}/share/hypercolor/launchd"
            cp packaging/launchd/tech.hyperbliss.hypercolor.plist \
              "${DIST}/share/hypercolor/launchd/"
          fi

          # License
          cp LICENSE "${DIST}/"

      - name: Create tarball
        working-directory: dist
        run: tar czf "${{ steps.version.outputs.dist_name }}.tar.gz" "${{ steps.version.outputs.dist_name }}"

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.dist_name }}
          path: dist/${{ steps.version.outputs.dist_name }}.tar.gz
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-release, build-native-app, python-publish]
    uses: hyperb1iss/shared-workflows/.github/workflows/github-release.yml@main
    with:
      attach-artifacts: true
      release-notes-run-id: ${{ inputs.release_run_id }}
    permissions:
      contents: write
      actions: read
    secrets: inherit

  # ── Update Homebrew Tap ────────────────────────────────────────
  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/')
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for platform in linux-amd64 linux-arm64 macos-arm64; do
            tarball="hypercolor-${VERSION}-${platform}.tar.gz"
            url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${tarball}"
            echo "Downloading ${tarball}..."
            curl -fSL "${url}" -o "${tarball}"
            sha=$(sha256sum "${tarball}" | cut -d' ' -f1)
            echo "sha256_${platform//-/_}=${sha}" >> "$GITHUB_OUTPUT"
            echo "  ${platform}: ${sha}"
          done

          for arch in arm64 x86_64; do
            dmg="Hypercolor-${VERSION}-${arch}.dmg"
            url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${dmg}"
            echo "Downloading ${dmg}..."
            curl -fSL "${url}" -o "${dmg}"
            sha=$(sha256sum "${dmg}" | cut -d' ' -f1)
            case "${arch}" in
              arm64) echo "sha256_macos_app_arm64=${sha}" >> "$GITHUB_OUTPUT" ;;
              x86_64) echo "sha256_macos_app_x86_64=${sha}" >> "$GITHUB_OUTPUT" ;;
            esac
            echo "  macos-app-${arch}: ${sha}"
          done

      - name: Generate Homebrew files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_MACOS_ARM64/${{ steps.checksums.outputs.sha256_macos_arm64 }}/g" \
            -e "s/SHA256_LINUX_AMD64/${{ steps.checksums.outputs.sha256_linux_amd64 }}/g" \
            -e "s/SHA256_LINUX_ARM64/${{ steps.checksums.outputs.sha256_linux_arm64 }}/g" \
            packaging/homebrew/hypercolor.rb > hypercolor.rb
          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_MACOS_APP_ARM64/${{ steps.checksums.outputs.sha256_macos_app_arm64 }}/g" \
            -e "s/SHA256_MACOS_APP_X86_64/${{ steps.checksums.outputs.sha256_macos_app_x86_64 }}/g" \
            packaging/homebrew/hypercolor-app.rb > hypercolor-app.rb
          echo "Generated formula:"
          cat hypercolor.rb
          echo "Generated cask:"
          cat hypercolor-app.rb

      - name: Push to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/hyperb1iss/homebrew-tap.git" tap
          mkdir -p tap/Formula tap/Casks
          cp hypercolor.rb tap/Formula/hypercolor.rb
          cp hypercolor-app.rb tap/Casks/hypercolor-app.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hypercolor.rb Casks/hypercolor-app.rb
          git commit -m "hypercolor: update to ${{ steps.version.outputs.version }}"
          git push
