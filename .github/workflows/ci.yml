name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "Run ID of the release workflow (for artifact download)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust Workspace ───────────────────────────────────────────
  rust:
    uses: hyperb1iss/shared-workflows/.github/workflows/rust-ci.yml@main
    with:
      change-detection: true
      change-filters: |
        rust:
          - 'crates/**'
          - 'Cargo.toml'
          - 'Cargo.lock'
          - 'rust-toolchain.toml'
          - 'deny.toml'
      system-deps: >-
        libudev-dev libdbus-1-dev libasound2-dev
        cmake nasm pkg-config lld
        libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
      workspace: true
      all-features: false
      all-targets: true
      nextest: true
      cargo-deny: true
      nightly-fmt: false
    permissions:
      contents: read
      pull-requests: read
    secrets: inherit

  # ── SDK (TypeScript / Bun) ───────────────────────────────────
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun run check
      - run: bun run build

  # ── UI (Leptos / Trunk) ────────────────────────────────────
  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/hypercolor-ui
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hypercolor-ui -> target
      - name: Install Trunk
        run: cargo install trunk --locked
      - run: npm ci
      - run: trunk build --release

  # ── Build Artifacts ──────────────────────────────────────────
  build-artifacts:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust, sdk, ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            suffix: ''
            system-deps: >-
              libudev-dev libdbus-1-dev libasound2-dev
              cmake nasm pkg-config lld
              libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
          - target: linux-arm64
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            suffix: ''
            system-deps: >-
              libudev-dev libdbus-1-dev libasound2-dev
              cmake nasm pkg-config lld
              libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            suffix: ''
            system-deps: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: matrix.system-deps != '' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.system-deps }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.rust-target }}
      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p staging
          for binary in hypercolor hyper; do
            cp "target/${{ matrix.rust-target }}/release/${binary}${{ matrix.suffix }}" "staging/"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: staging/
          if-no-files-found: error

  # ── Create GitHub Release ────────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-artifacts
    uses: hyperb1iss/shared-workflows/.github/workflows/github-release.yml@main
    with:
      attach-artifacts: true
      release-notes-run-id: ${{ inputs.release_run_id }}
    permissions:
      contents: write
      actions: read
    secrets: inherit

  # ── Update Homebrew Tap ──────────────────────────────────────
  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/')
    needs: create-release
    uses: hyperb1iss/shared-workflows/.github/workflows/homebrew-update.yml@main
    with:
      formula-name: hypercolor
      description: "Open-source RGB lighting orchestration engine"
      homepage: "https://github.com/hyperb1iss/hypercolor"
      binary-names: 'hypercolor hyper'
    secrets: inherit
