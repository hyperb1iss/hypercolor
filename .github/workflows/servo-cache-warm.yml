name: Servo Cache Warm

on:
  workflow_dispatch:

concurrency:
  group: servo-cache-warm-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: "1.95.0"
  APT_STEP_TIMEOUT: 20m
  APT_HTTP_TIMEOUT: "20"
  APT_RETRIES: "5"
  LINUX_RUST_DEPS: >-
    libudev-dev libdbus-1-dev libasound2-dev libpulse0
    libpipewire-0.3-dev
    ccache cmake jq nasm pkg-config lld
    libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev
    libxdo-dev libfontconfig1-dev libegl1 libssl-dev
  # rust-cache hashes every RUST* variable into the restore key, so this must
  # match the canonical CI workflow even though the warmer does not invoke it.
  RUST_SHARED_WORKSPACE_ARGS: >-
    --workspace
    --exclude hypercolor-daemon
    --exclude hypercolor-app
    --exclude hypercolor-tray
  HYPERCOLOR_CACHE_DIR: ${{ github.workspace }}/.cache/hypercolor
  MOZBUILD_STATE_PATH: ${{ github.workspace }}/.cache/hypercolor/mozbuild
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read

jobs:
  warm-servo:
    name: Servo Cache
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/hypercolor/target/servo
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            update
          sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s "$APT_STEP_TIMEOUT" apt-get \
            -o Dpkg::Use-Pty=0 \
            -o Acquire::Retries="$APT_RETRIES" \
            -o Acquire::http::Timeout="$APT_HTTP_TIMEOUT" \
            -o Acquire::https::Timeout="$APT_HTTP_TIMEOUT" \
            install -y --no-install-recommends ${{ env.LINUX_RUST_DEPS }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: ./.github/actions/rust-build-cache
        with:
          shared-key: servo
          workspaces: . -> .cache/hypercolor/target/servo
          cache-workspace-crates: "true"
          cache-directories: |
            .cache/hypercolor/mozbuild
            .cache/hypercolor/toolchain
            .cache/hypercolor/ccache
          cache-on-failure: "false"

      - name: Warm Servo e2e binaries
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo build --locked -p hypercolor-daemon -p hypercolor-cli

      - name: Warm core Servo test artifacts
        run: |
          ./scripts/cargo-cache-build.sh cargo test --locked --no-run -p hypercolor-core --features servo --test effect_factory_tests
          ./scripts/cargo-cache-build.sh cargo test --locked --no-run -p hypercolor-core --features servo --test builtin_effect_tests

      - name: Warm core Servo clippy artifacts
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked -p hypercolor-core --features servo --lib --tests
          -- -D warnings

      - name: Warm daemon Servo test artifacts
        run: |
          ./scripts/cargo-cache-build.sh cargo test --locked --no-run -p hypercolor-daemon --lib
          ./scripts/cargo-cache-build.sh cargo test --locked --no-run -p hypercolor-daemon --bin hypercolor-daemon

      - name: Warm daemon Servo clippy artifacts
        run: >-
          ./scripts/cargo-cache-build.sh
          cargo clippy --locked -p hypercolor-daemon --lib --bin hypercolor-daemon --tests
          -- -D warnings
