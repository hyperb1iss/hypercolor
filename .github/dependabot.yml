version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      rust:
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/crates/hypercolor-ui"
    schedule:
      interval: "monthly"
      time: "09:20"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      ui-rust:
        patterns: ["*"]

  - package-ecosystem: "bun"
    directory: "/sdk"
    schedule:
      interval: "monthly"
      time: "09:40"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      sdk-bun:
        patterns: ["*"]

  - package-ecosystem: "bun"
    directory: "/crates/hypercolor-ui"
    schedule:
      interval: "monthly"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      ui-bun:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "monthly"
      time: "10:20"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      e2e-npm:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directory: "/python"
    schedule:
      interval: "monthly"
      time: "10:40"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      python-uv:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "11:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns: ["*"]
