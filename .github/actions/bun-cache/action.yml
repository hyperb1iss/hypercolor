name: Bun cache
description: Install Bun and restore its global package cache.

inputs:
  key:
    description: Fully resolved cache key segment for this dependency set.
    required: true

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2

    - name: Restore Bun package cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ inputs.key }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ inputs.key }}-
          ${{ runner.os }}-bun-
