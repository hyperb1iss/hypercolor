name: Rust build cache
description: Configure Hypercolor's Cargo, Servo, and compiler caches.

inputs:
  key:
    description: Additional cache key segment for this build shape.
    required: false
    default: ""
  shared-key:
    description: Stable cache key segment shared by compatible Rust jobs.
    required: false
    default: "workspace"
  workspaces:
    description: Swatinem/rust-cache workspace mapping.
    required: false
    default: ". -> .cache/hypercolor/target"
  save-if:
    description: >-
      Whether to save cache entries after the job. "auto" saves only on the
      default branch so PR and tag runs restore without competing for the
      repo's 10GB cache quota.
    required: false
    default: "auto"
  cache-all-crates:
    description: Cache all crates, including CI tooling crates.
    required: false
    default: "false"
  cache-workspace-crates:
    description: Cache workspace crate artifacts as well as dependencies.
    required: false
    default: "false"
  cache-directories:
    description: Additional build-state directories owned by this cache shape.
    required: false
    default: ""
  cache-on-failure:
    description: Whether to save Rust cache entries after failed jobs.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Enable compiler cache
      shell: bash
      run: |
        {
          echo "CARGO_INCREMENTAL=0"
          echo "CCACHE_COMPRESS=true"
          echo "CCACHE_MAXSIZE=500M"
          echo "CARGO_PROFILE_DEV_DEBUG=0"
          echo "CARGO_PROFILE_TEST_DEBUG=0"
          echo "CARGO_PROFILE_DEV_BUILD_OVERRIDE_DEBUG=0"
          echo "CARGO_PROFILE_TEST_BUILD_OVERRIDE_DEBUG=0"
        } >> "$GITHUB_ENV"

    - name: Restore Rust and Servo caches
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: hypercolor-rust
        shared-key: ${{ inputs.shared-key }}
        key: ${{ inputs.key }}
        workspaces: ${{ inputs.workspaces }}
        cache-directories: ${{ inputs.cache-directories }}
        cache-all-crates: ${{ inputs.cache-all-crates }}
        cache-workspace-crates: ${{ inputs.cache-workspace-crates }}
        cache-on-failure: ${{ inputs.cache-on-failure }}
        save-if: >-
          ${{ inputs.save-if == 'true' ||
              (inputs.save-if == 'auto' && github.ref == 'refs/heads/main') }}
