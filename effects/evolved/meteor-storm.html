      lastHeight = h;

        const vx2 = (Math.random() - 0.5) * baseSpeed * 0.09;

          x: Math.random() * (w + 24) - 12,
          y: -trail - Math.random() * h * 0.32,
          vx: vx2,
          vy: vy2,
          size,
          trail,
          phase: Math.random() * Math.PI * 2,
          brightness: 1
        };

      const vy = baseSpeed * (0.78 + Math.random() * 0.76);
      const direction = Math.random() < 0.86 ? 1 : -1;
      const vx = baseSpeed * (0.3 + Math.random() * 0.34) * direction;
      return {
        x: Math.random() * (w + 32) - 16,
        y: -trail - Math.random() * h * 0.42,

      const starSize = c.starSize;
      const density = c.density;
      const trailCtrl = c.trail;
      const skyTop = c.skyTop;
      const skyBottom = c.skyBottom;
      const starColor = c.starColor;
