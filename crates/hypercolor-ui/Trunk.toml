[build]
target = "index.html"
dist = "dist"
public_url = "/"
filehash = true

# Pin tool versions so the repo controls them, not whatever's on $PATH.
# wasm-opt < 119 fails with "invalid code after misc prefix" against the
# WASM that current rustc + wasm-bindgen emit.
[tools]
wasm_opt = "version_129"

[watch]
watch = ["src", "input.css", "tokens", "index.html"]

[serve]
addresses = ["127.0.0.1"]
port = 9430
open = false

# Compile Tailwind CSS before each build
[[hooks]]
stage = "pre_build"
command = "bunx"
command_arguments = ["--no-install", "tailwindcss", "-i", "input.css", "-o", "tailwind-out.css", "--content", "./src/**/*.rs,./index.html"]

[hooks.windows]
command = "bunx.exe"
command_arguments = ["--no-install", "tailwindcss", "-i", "input.css", "-o", "tailwind-out.css", "--content", "./src/**/*.rs,./index.html"]

[[proxy]]
backend = "http://127.0.0.1:9420/api"
