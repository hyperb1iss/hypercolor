[build]
target = "index.html"
dist = "dist"
public_url = "/"
filehash = true

[watch]
watch = ["src", "input.css", "tokens", "index.html"]

[serve]
addresses = ["127.0.0.1"]
port = 9430
open = false

# Compile Tailwind CSS before each build
[[hooks]]
stage = "pre_build"
command = "npx"
command_arguments = ["@tailwindcss/cli", "-i", "input.css", "-o", "tailwind-out.css", "--content", "./src/**/*.rs,./index.html"]

[[proxy]]
backend = "http://127.0.0.1:9420/api"
