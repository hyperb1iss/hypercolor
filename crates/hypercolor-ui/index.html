<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypercolor</title>
    <link data-trunk rel="css" href="tailwind-out.css" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=satoshi:400,500,600,700|jetbrains-mono:400,500,600,400i|orbitron:400,500,600,700,800,900|playfair-display:400,400i,600,600i,700,700i,800i|dancing-script:400,500,600,700" rel="stylesheet" />
    <script>
        // Restore theme preference before first paint to avoid flash
        (function() {
            var t = localStorage.getItem('hc-theme');
            if (t === 'light' || t === 'dark') {
                document.documentElement.setAttribute('data-theme', t);
            } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>
<body class="bg-surface-base text-text-primary antialiased font-sans">
</body>
</html>
