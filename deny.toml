[advisories]
# vulnerability field removed in cargo-deny 0.18+ (all vulns are errors now)
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # gtk3-rs unmaintained — transitive dep from tray-icon/tauri, no upgrade path
    "RUSTSEC-2024-0415",
    # ml-dsa timing side-channel — transitive dep from Servo, no safe upgrade
    "RUSTSEC-2025-0144",
    # rsa Marvin Attack — transitive dep from Servo/script, no safe upgrade
    "RUSTSEC-2023-0071",
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MPL-2.0",
    "NCSA",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/servo/servo",
    "https://github.com/servo/media",
    "https://github.com/servo/stylo",
    "https://github.com/hyperb1iss/opaline",
]
