<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="prism-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e135ff"/>
      <stop offset="40%" stop-color="#80ffea"/>
      <stop offset="70%" stop-color="#ff6ac1"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e135ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e135ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#80ffea" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#80ffea" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6ac1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6ac1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1fa8c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f1fa8c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d0d1a"/>
  <!-- Spectral rays dispersing from prism -->
  <line x1="270" y1="200" x2="460" y2="140" stroke="url(#ray1)" stroke-width="5"/>
  <line x1="270" y1="210" x2="460" y2="200" stroke="url(#ray2)" stroke-width="5"/>
  <line x1="270" y1="220" x2="460" y2="260" stroke="url(#ray3)" stroke-width="5"/>
  <line x1="270" y1="230" x2="460" y2="320" stroke="url(#ray4)" stroke-width="5"/>
  <line x1="270" y1="240" x2="460" y2="380" stroke="url(#ray5)" stroke-width="5"/>
  <!-- Incident light beam -->
  <line x1="50" y1="200" x2="190" y2="260" stroke="white" stroke-width="6" opacity="0.4"/>
  <!-- Prism -->
  <polygon points="200,100 320,310 80,310" fill="none" stroke="url(#prism-edge)" stroke-width="20" stroke-linejoin="round"/>
  <!-- Inner glow -->
  <polygon points="200,130 300,295 100,295" fill="url(#prism-edge)" opacity="0.08"/>
  <!-- Brand text -->
  <text x="256" y="430" font-family="sans-serif" font-size="64" font-weight="700" fill="url(#prism-edge)" text-anchor="middle" letter-spacing="4">HYPERCOLOR</text>
</svg>
