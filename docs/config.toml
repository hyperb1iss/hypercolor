title = "Hypercolor"
description = "Open-source RGB lighting orchestration engine for Linux"
base_url = "https://hyperb1iss.github.io/hypercolor"
compile_sass = true
build_search_index = true
generate_feeds = false
minify_html = true

[search]
include_title = true
include_description = true
include_path = true
include_content = true

[markdown]
smart_punctuation = true
insert_anchor_links = "left"
bottom_footnotes = true

[markdown.highlighting]
enabled = true
theme = "one-dark-pro"

[extra]
github_url = "https://github.com/hyperb1iss/hypercolor"
license = "Apache-2.0"
author = "Stefanie Jane"

# Top navigation — the 11 doc front doors, in order. Plain url paths (not
# @/…_index.md colocation lookups) so the build never trips on a section that
# is still being authored (e.g. agents/). `prefix` drives the active-link
# highlight via current_path matching.
[[extra.menu]]
name = "Home"
url = "/"
prefix = "$home"

[[extra.menu]]
name = "Guide"
url = "/guide/"
prefix = "/guide/"

[[extra.menu]]
name = "Studio"
url = "/studio/"
prefix = "/studio/"

[[extra.menu]]
name = "Effects"
url = "/effects/"
prefix = "/effects/"

[[extra.menu]]
name = "Agents & MCP"
url = "/agents/"
prefix = "/agents/"

[[extra.menu]]
name = "API"
url = "/api/"
prefix = "/api/"

[[extra.menu]]
name = "Hardware"
url = "/hardware/"
prefix = "/hardware/"

[[extra.menu]]
name = "Troubleshooting"
url = "/troubleshooting/"
prefix = "/troubleshooting/"

[[extra.menu]]
name = "Architecture"
url = "/architecture/"
prefix = "/architecture/"

[[extra.menu]]
